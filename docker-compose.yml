services:
  mysql:
    image: mysql:8.0
    container_name: veterinaria-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-clientes_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - veterinaria-net

  app:
    build: .
    container_name: veterinaria-cliente
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-clientes_db}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      JWT_SECRET: ${JWT_SECRET:-clave-secreta-jwt-veterinaria-2025-duoc-uc-segura}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - veterinaria-net
    restart: on-failure

volumes:
  mysql_data:

networks:
  veterinaria-net:
    driver: bridge
