apiVersion: v1
kind: ServiceAccount
metadata:
  name: veterinaria-sa
  namespace: veterinaria
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: veterinaria-role
  namespace: veterinaria
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: veterinaria-rolebinding
  namespace: veterinaria
subjects:
  - kind: ServiceAccount
    name: veterinaria-sa
    namespace: veterinaria
roleRef:
  kind: Role
  name: veterinaria-role
  apiGroup: rbac.authorization.k8s.io
